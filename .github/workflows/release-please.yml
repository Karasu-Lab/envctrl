name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release-as:
        description: 'Override release version (e.g. 1.2.0). Leave empty to let Release Please decide.'
        required: false
        type: string

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.release-as }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @envctrl/types --filter @envctrl/cli build

      - name: Publish
        run: |
          publish_or_skip() {
            local filter="$1"
            local output
            output=$(pnpm --filter "$filter" publish --no-git-checks 2>&1)
            local exit_code=$?
            echo "$output"
            if [ $exit_code -ne 0 ] && ! echo "$output" | grep -q "previously published versions"; then
              exit $exit_code
            fi
          }
          publish_or_skip "@envctrl/types"
          publish_or_skip "@envctrl/cli"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
