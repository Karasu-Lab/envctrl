name: Release Please

on:
  workflow_dispatch:
    inputs:
      release-as:
        description: "Override release version (e.g. 1.2.0). Leave empty to let Release Please decide."
        required: false
        type: string

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.release-as }}
